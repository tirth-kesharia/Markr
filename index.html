<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Markr Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#F8FAFC;font-family:'Inter',-apple-system,sans-serif;color:#111827;-webkit-font-smoothing:antialiased;font-size:13px}
    .nav{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1.5px solid #E5E7EB;height:56px;display:flex;align-items:center;padding:0 28px;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:9px}
    .logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#6366F1,#818CF8);display:flex;align-items:center;justify-content:center}
    .copy-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;background:#6366F1;color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
    .copy-btn.done{background:#16A34A}
    .meta{background:#fff;border-bottom:1.5px solid #E5E7EB;padding:18px 28px}
    .meta-h{font-size:20px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:9px;margin-bottom:14px}
    .dot{width:8px;height:8px;border-radius:50%;background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,.18);flex-shrink:0}
    .meta-cols{display:flex;gap:40px;flex-wrap:wrap}
    .ml{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9CA3AF;margin-bottom:3px}
    .mv{font-size:13px;font-weight:500;color:#374151}
    .mv a{color:#6366F1;text-decoration:none}.mv a:hover{text-decoration:underline}
    .mv.big{font-size:26px;font-weight:800;color:#6366F1;line-height:1}
    .body{max-width:1160px;margin:0 auto;padding:26px 28px 72px}
    .slbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#9CA3AF;margin-bottom:12px}
    .ss-card{background:#fff;border:1.5px solid #E5E7EB;border-radius:14px;overflow:hidden;margin-bottom:30px}
    .ss-top{padding:10px 14px;border-bottom:1.5px solid #F3F4F6;font-size:11px;color:#9CA3AF;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ss-body{position:relative;background:#F1F5F9}
    .ss-body img{width:100%;display:block}
    .ss-none{display:flex;align-items:center;justify-content:center;gap:8px;padding:56px;color:#CBD5E1;font-size:13px}
    .pm{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10;transition:transform .15s}
    .pm:hover{transform:translate(-50%,-50%) scale(1.2)}
    .ann-list{display:flex;flex-direction:column;gap:10px}
    .ann-card{background:#fff;border:1.5px solid #E5E7EB;border-radius:14px;overflow:hidden;display:flex;cursor:pointer;transition:border-color .15s,box-shadow .15s}
    .ann-card:hover{border-color:#A5B4FC;box-shadow:0 4px 20px rgba(99,102,241,.07)}
    .ann-card.flash{border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,.18)}
    .ann-thumb{width:180px;min-width:180px;background:#F8FAFC;border-right:1.5px solid #F3F4F6;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .twrap{position:relative;width:100%;height:100px;overflow:hidden}
    .twrap img{position:absolute;max-width:none}
    .tdot{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .tfb{display:flex;align-items:center;justify-content:center;height:100px;font-size:28px;opacity:.25;width:100%}
    .ann-body{flex:1;padding:14px 18px;display:flex;flex-direction:column;gap:6px;min-width:0}
    .ann-hdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .ann-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
    .ann-type{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
    .ann-cat{padding:2px 8px;border-radius:99px;font-size:9px;font-weight:600}
    .ann-comment{font-size:13px;color:#374151;line-height:1.6}
    .ann-comment.empty{color:#D1D5DB;font-style:italic;font-size:12px}
    .ann-meta{font-size:10px;color:#9CA3AF}
    .ap{display:flex;align-items:center;gap:10px;background:#F8FAFC;border:1.5px solid #E5E7EB;border-radius:9px;padding:9px 12px;margin-top:4px}
    .apbtn{width:30px;height:30px;border-radius:50%;background:#6366F1;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .apbtn.pl{background:#EF4444}
    .apbar{flex:1;height:4px;background:#E5E7EB;border-radius:99px;cursor:pointer;overflow:hidden}
    .apfill{height:100%;background:#6366F1;border-radius:99px;pointer-events:none}
    .aptime{font-size:10px;color:#9CA3AF;font-family:monospace;white-space:nowrap}
    .state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:14px;text-align:center;padding:40px}
    .spin{width:34px;height:34px;border:3px solid #E5E7EB;border-top-color:#6366F1;border-radius:50%;animation:spin .65s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<nav class="nav">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="9" r="5"/><line x1="12" y1="14" x2="12" y2="21"/>
      </svg>
    </div>
    <span style="font-size:16px;font-weight:800;color:#111827;letter-spacing:-0.4px;">Markr</span>
    <span style="background:#EEF2FF;color:#6366F1;border:1px solid #C7D2FE;border-radius:99px;font-size:10px;font-weight:600;padding:2px 9px;">Report</span>
  </div>
  <button class="copy-btn" id="copyBtn">
    <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    Copy link
  </button>
</nav>

<div id="loading" class="state"><div class="spin"></div><span style="color:#9CA3AF">Loading report…</span></div>
<div id="error" class="state" style="display:none">
  <div style="font-size:40px;opacity:.2">📋</div>
  <div style="font-size:17px;font-weight:700">Report not found</div>
  <div id="errMsg" style="font-size:13px;color:#9CA3AF;max-width:300px;line-height:1.7;margin-top:4px"></div>
</div>

<div id="report" style="display:none">
  <div class="meta">
    <div class="meta-h"><div class="dot"></div>Markr Feedback Report</div>
    <div class="meta-cols">
      <div><div class="ml">Page</div><div class="mv"><a id="mUrl" href="#" target="_blank"></a></div></div>
      <div><div class="ml">Date</div><div class="mv" id="mDate"></div></div>
      <div><div class="ml">Annotations</div><div class="mv big" id="mCount"></div></div>
      <div><div class="ml">Page size</div><div class="mv" id="mSize"></div></div>
    </div>
  </div>
  <div class="body">
    <div class="slbl">ANNOTATED SCREENSHOT — CLICK A MARKER TO JUMP TO ITS COMMENT</div>
    <div class="ss-card">
      <div class="ss-top" id="ssUrl"></div>
      <div class="ss-body" id="ssBody"><div class="ss-none">📸 No screenshot</div></div>
    </div>
    <div class="slbl">ANNOTATIONS IN ORDER</div>
    <div class="ann-list" id="annList"></div>
  </div>
</div>

<script>
(function(){
  var CAT={Bug:'#EF4444',Design:'#3B82F6',UX:'#F97316',Content:'#22C55E',Idea:'#A855F7'};

  function getReport() {
    // Try hash first (new URL-encoded format)
    var hash = location.hash.slice(1);
    if (hash && hash.length > 10) {
      try {
        var json = decodeURIComponent(escape(atob(hash)));
        return JSON.parse(json);
      } catch(e) { /* fall through */ }
    }
    return null;
  }

  var report = getReport();

  if (report) {
    // Report is in the URL hash — render immediately, no fetch needed
    document.getElementById('loading').style.display = 'none';
    render(report);
  } else {
    showErr('No report data found in this link. Please regenerate the report from the Markr extension.');
  }

  function render(r) {
    document.getElementById('report').style.display = 'block';
    document.title = 'Markr — ' + host(r.url);

    var ua = document.getElementById('mUrl');
    ua.textContent = r.url || '—'; ua.href = r.url || '#';

    var d = new Date(r.createdAt || Date.now());
    document.getElementById('mDate').textContent =
      d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) +
      ' · ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('mCount').textContent = r.annotations.length;
    document.getElementById('mSize').textContent = r.pageW && r.pageH ? r.pageW + '×' + r.pageH + 'px' : '—';
    document.getElementById('ssUrl').textContent = r.url || '';

    if (r.screenshot) {
      var sb = document.getElementById('ssBody');
      sb.innerHTML = '';
      var img = document.createElement('img');
      img.src = r.screenshot;
      sb.appendChild(img);
      var sorted = r.annotations.slice().sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0);});
      img.onload = function(){ placeMarkers(sorted, sb, img, r.pageW); };
      if (img.complete) placeMarkers(sorted, sb, img, r.pageW);
    }

    var sorted = r.annotations.slice().sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0);});
    sorted.forEach(function(ann, i){ document.getElementById('annList').appendChild(card(ann, i, r)); });

    document.getElementById('copyBtn').onclick = function() {
      var btn = this;
      navigator.clipboard.writeText(location.href).then(function() {
        btn.innerHTML = '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> ✓ Copied!';
        btn.classList.add('done');
        setTimeout(function(){
          btn.innerHTML = '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy link';
          btn.classList.remove('done');
        }, 2500);
      });
    };
  }

  function placeMarkers(anns, container, img, pageW) {
    var sx = img.offsetWidth / (pageW || img.naturalWidth || img.offsetWidth);
    anns.forEach(function(ann, i) {
      if (ann.x === undefined || ['draw','arrow','rect'].indexOf(ann.type) !== -1) return;
      var c = getCol(ann);
      var m = document.createElement('div'); m.className = 'pm';
      m.style.left = (ann.x * sx) + 'px';
      m.style.top  = (ann.y * sx) + 'px';
      if (ann.type === 'reaction' && ann.reactionId === 'cross') {
        m.innerHTML = '<div style="width:26px;height:26px;border-radius:50%;background:#FFF1F2;border:2.5px solid #EF4444;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(239,68,68,.3);"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>';
      } else if (ann.type === 'reaction') {
        m.innerHTML = '<div style="width:26px;height:26px;border-radius:50%;background:#fff;border:2px solid #E5E7EB;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.1);">' + ann.emoji + '</div>';
      } else if (ann.type === 'audio') {
        m.innerHTML = '<div style="width:28px;height:28px;border-radius:50%;background:'+c+';display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 10px '+c+'88;border:2.5px solid #fff;">🎙</div>';
      } else {
        m.innerHTML = '<div style="width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:'+c+';border:2.5px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);color:#fff;font-size:9px;font-weight:800;font-family:monospace;display:block;">'+(i+1)+'</span></div>';
      }
      m.onclick = function(){ flash(i); };
      container.appendChild(m);
    });
  }

  function card(ann, i, r) {
    var c = getCol(ann);
    var el = document.createElement('div');
    el.className = 'ann-card'; el.id = 'ac' + i;

    var th = document.createElement('div'); th.className = 'ann-thumb';
    if (r.screenshot && ann.x !== undefined && ['draw','arrow','rect'].indexOf(ann.type) === -1) {
      var sx = r.pageW ? (r.viewportW || r.pageW) / r.pageW : 1;
      var w = document.createElement('div'); w.className = 'twrap';
      var ti = document.createElement('img'); ti.src = r.screenshot;
      ti.onload = function() {
        var ox = ann.x * sx - 140, oy = ann.y * sx - 80;
        var sc = 180 / 280;
        ti.style.width  = (ti.naturalWidth * sc) + 'px';
        ti.style.left   = (-ox * sc) + 'px';
        ti.style.top    = (-oy * sc) + 'px';
      };
      w.appendChild(ti);
      var dot = document.createElement('div'); dot.className = 'tdot';
      if (ann.type === 'audio') {
        dot.innerHTML = '<div style="width:22px;height:22px;border-radius:50%;background:'+c+';display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.2);">🎙</div>';
      } else if (ann.type === 'reaction' && ann.reactionId === 'cross') {
        dot.innerHTML = '<div style="width:20px;height:20px;border-radius:50%;background:#FFF1F2;border:2px solid #EF4444;display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 24 24" width="9" height="9" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>';
      } else if (ann.type === 'reaction') {
        dot.innerHTML = '<div style="width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid #E5E7EB;display:flex;align-items:center;justify-content:center;font-size:13px;">'+ann.emoji+'</div>';
      } else {
        dot.innerHTML = '<div style="width:20px;height:20px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:'+c+';border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);color:#fff;font-size:8px;font-weight:800;font-family:monospace;display:block;">'+(i+1)+'</span></div>';
      }
      w.appendChild(dot); th.appendChild(w);
    } else {
      var icons = {pin:'📍',draw:'✏️',arrow:'↗️',rect:'⬜',audio:'🎙️',reaction:ann.emoji||'❤️'};
      th.innerHTML = '<div class="tfb">'+(icons[ann.type]||'📍')+'</div>';
    }
    el.appendChild(th);

    var bd = document.createElement('div'); bd.className = 'ann-body';
    var hdr = document.createElement('div'); hdr.className = 'ann-hdr';
    hdr.innerHTML =
      '<div class="ann-num" style="background:'+c+';">'+(i+1)+'</div>'+
      '<span class="ann-type" style="color:'+c+';">'+(ann.type==='rect'?'MARK':ann.type).toUpperCase()+'</span>'+
      '<span class="ann-cat" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'33;">'+(ann.category||'')+'</span>';
    bd.appendChild(hdr);

    var cmt = ann.type === 'reaction'
      ? (ann.reactionId === 'cross' ? '❌ Rejected' : ann.emoji + ' ' + ann.reactionLabel)
      : (ann.comment || ann.text || '');
    var ce = document.createElement('div');
    ce.className = 'ann-comment' + (cmt ? '' : ' empty');
    ce.textContent = cmt || 'No comment left';
    bd.appendChild(ce);

    if (ann.type === 'audio' && ann.audioData) bd.appendChild(audioPlayer(ann));
    else if (ann.hasAudio) {
      var n = document.createElement('div'); n.className = 'ann-meta';
      n.textContent = '🎙️ Audio note recorded'; bd.appendChild(n);
    }

    if (ann.x !== undefined) {
      var pos = document.createElement('div'); pos.className = 'ann-meta';
      pos.textContent = '@ ' + Math.round(ann.x) + ', ' + Math.round(ann.y) + 'px';
      bd.appendChild(pos);
    }

    el.appendChild(bd);
    el.onclick = function(e) { if (e.target.closest('.ap')) return; flash(i); scrollMarker(i); };
    return el;
  }

  function audioPlayer(ann) {
    var wrap = document.createElement('div'); wrap.className = 'ap';
    var audio = new Audio(ann.audioData);
    wrap.innerHTML =
      '<button class="apbtn"><svg viewBox="0 0 24 24" width="13" height="13" fill="white"><polygon points="5,3 19,12 5,21"/></svg></button>'+
      '<div class="apbar"><div class="apfill" style="width:0%"></div></div>'+
      '<span class="aptime">0:00</span>';
    var btn = wrap.querySelector('.apbtn');
    var fill = wrap.querySelector('.apfill');
    var time = wrap.querySelector('.aptime');
    var bar = wrap.querySelector('.apbar');
    btn.onclick = function(e){ e.stopPropagation(); audio.paused ? audio.play() : audio.pause(); };
    audio.onplay = function(){ btn.classList.add('pl'); btn.innerHTML='<svg viewBox="0 0 24 24" width="13" height="13" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'; };
    audio.onpause = audio.onended = function(){ btn.classList.remove('pl'); btn.innerHTML='<svg viewBox="0 0 24 24" width="13" height="13" fill="white"><polygon points="5,3 19,12 5,21"/></svg>'; };
    audio.ontimeupdate = function(){ if(audio.duration){ fill.style.width=(audio.currentTime/audio.duration*100)+'%'; time.textContent=fmt(Math.round(audio.currentTime))+'/'+fmt(Math.round(audio.duration)); } };
    bar.onclick = function(e){ e.stopPropagation(); if(audio.duration){ var rc=bar.getBoundingClientRect(); audio.currentTime=(e.clientX-rc.left)/rc.width*audio.duration; } };
    return wrap;
  }

  function flash(i){ var c=document.getElementById('ac'+i); if(!c)return; c.scrollIntoView({behavior:'smooth',block:'center'}); c.classList.remove('flash'); void c.offsetWidth; c.classList.add('flash'); setTimeout(function(){c.classList.remove('flash');},1500); }
  function scrollMarker(i){ var m=document.querySelectorAll('.pm')[i]; if(m){m.scrollIntoView({behavior:'smooth',block:'center'});m.style.transform='translate(-50%,-50%) scale(1.4)';setTimeout(function(){m.style.transform='';},500);} }
  function getCol(a){ if(a.type==='reaction')return a.reactionId==='cross'?'#EF4444':'#F472B6'; return CAT[a.category]||'#6366F1'; }
  function fmt(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
  function host(u){ try{return new URL(u).hostname;}catch(e){return u||'';} }
  function showErr(m){ document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='flex'; document.getElementById('errMsg').textContent=m; }
})();
</script>
</body>
</html>
